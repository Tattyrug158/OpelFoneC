<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/css.css">
    <title>OpelFone - Sistema</title>
</head>
<body>
    <div class="nab_div">
        <h1>OpelFone Administrator</h1>
        <button class="user">A.Alison</button>
    </div>

    <nav>
        <div class="nab_div2">
            <ul class="navbar">
                <li class="navbarselected"><a href="index.html">Inicio</a></li>
                <li><a href="facturacion.html">Facturación</a></li>
                <li><a href="usuarios.html">Usuarios</a></li>
                <li><a href="dispositivos.html">Dispositivos</a></li>
                <li><a href="sistema.html">Sistema</a></li>
            </ul>
        </div>
    </nav>

    <main class="contenido">
        <h2>Información del Sistema</h2>

        <div class="cards-container">
            <div class="card">
                <h3>Almacenamiento total</h3>
                <div class="progress"><div class="progress-bar" style="width: 20%; background-color:#2196f3;"></div></div>
                <p>20%</p>
            </div>
            <div class="card">
                <h3>Crecimiento de usuarios (último mes)</h3>
                <div class="progress"><div class="progress-bar" style="width: 78%; background-color:#ff9800;"></div></div>
                <p>78%</p>
            </div>
            <div class="card">
                <h3>Reportes de errores</h3>
                <div class="progress"><div class="progress-bar" style="width: 1%; background-color:#9c27b0;"></div></div>
                <p>1%</p>
            </div>
        </div>

        <div class="chart"></div>
    </main>
</body>
