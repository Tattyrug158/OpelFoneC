<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css\css.css">
    <title>OpelFone</title>
        <link rel="icon" href="sources/Logo.ico">

</head>
<body>
    <div class="contenedor">
        <H1 class="marca">OpelFone</H1>
    </div>

    <div class="contenedor">
        <h1 class="titulo">Inicia Sesion</h1>
        <hr class="line">


        <form method="POST" id="loginForm">
        <div >
            
            <label class="label">E-mail</label><br>
            <input class="texto" type="text" name="email" required><br>
            
            <label class="label">Contraseña</label><br>
            <input class="texto" type="password" name="password" required><br>

            <button class="boton" type="submit" >Iniciar Sesión</button>
        </div>
        </form>
    </div>

    <div style="width: 100%;justify-content: center; align-items: center; text-align: center;">
        <a href="registro_usuario.html"><h1 class="sub" style="font-family: comfortaa;">¿No tienes cuenta?, Registrate</h1></a>
                <a href="Inicio_sesión_admin.html"><h1 class="sub" style="font-family: comfortaa;">Administrator</h1></a>

    </div> 

    <script>

    document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault(); // Esta línea es la clave para no usar 'action'

    const formData = new FormData(this);

    fetch('php/login.php', {
        method: 'POST',
        body: formData
    })
    .then(response => response.text())
    .then(data => {
        if (data.trim() === "exito") {
            window.location.href = "../Users/html/index.php"; // Redirección exitosa
        } else {
            alert("Error: Usuario o contraseña incorrectos."); // Alerta de validación
        }
    })
    .catch(error => console.error('Error:', error));
}); 
    </script>

</body>
</html>
